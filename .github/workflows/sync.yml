name: Sync OMRON to Garmin

on:
  schedule:
    # Запуск каждый день в 9:00 UTC
    - cron: '0 9 * * *'
  workflow_dispatch:  # чтобы можно было запустить вручную

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Install omramin
        run: uv pip install "git+https://github.com/bugficks/omramin.git"

      - name: Run omramin sync
        env:
          GARMIN_USERNAME: ${{ secrets.GARMIN_USERNAME }}
          GARMIN_PASSWORD: ${{ secrets.GARMIN_PASSWORD }}
          OMRON_USERNAME: ${{ secrets.OMRON_USERNAME }}
          OMRON_PASSWORD: ${{ secrets.OMRON_PASSWORD }}
        run: |
          # Передаём учётные данные через переменные окружения, как требует omramin
          # Можно использовать `omramin init --non-interactive` или прямой логин
          echo "$GARMIN_USERNAME" | omramin garmin login --username "$GARMIN_USERNAME" --password "$GARMIN_PASSWORD"
          echo "$OMRON_USERNAME" | omramin omron login --username "$OMRON_USERNAME" --password "$OMRON_PASSWORD"
          omramin sync --days 1
