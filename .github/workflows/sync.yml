name: Omramin Daily Sync

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install omramin
        run: |
          pip install "git+https://github.com/bugficks/omramin.git"

      - name: Configure omramin (non‑interactive)
        env:
          GARMIN_EMAIL: ${{ secrets.GARMIN_EMAIL }}
          GARMIN_PASSWORD: ${{ secrets.GARMIN_PASSWORD }}
          OMRON_EMAIL: ${{ secrets.OMRON_EMAIL }}
          OMRON_PASSWORD: ${{ secrets.OMRON_PASSWORD }}
        run: |
          # Передаём логин/пароль Garmin и Omron в интерактивный мастер init
          printf "%s\n%s\n%s\n%s\n" \
            "$GARMIN_EMAIL" \
            "$GARMIN_PASSWORD" \
            "$OMRON_EMAIL" \
            "$OMRON_PASSWORD" \
            | omramin init

      - name: Run sync (last 7 days)
        run: omramin sync --days 7
