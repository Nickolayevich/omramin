name: Omramin Daily Sync

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install omramin
        run: |
          pip install "git+https://github.com/bugficks/omramin.git"

      - name: Create Config
        run: |
          mkdir -p ~/.config/omramin/
          cat <<EOF > ~/.config/omramin/config.json
          {
            "garmin": {
              "email": "${{ secrets.GARMIN_EMAIL }}",
              "password": "${{ secrets.GARMIN_PASSWORD }}"
            },
            "omron": {
              "email": "${{ secrets.OMRON_EMAIL }}",
              "password": "${{ secrets.OMRON_PASSWORD }}",
              "region": "NA"
            },
            "devices": [],
            "tokens": {}
          }
          EOF

      - name: Run Sync
        run: omramin --debug sync --days 7
